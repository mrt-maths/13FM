<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vector Voyage: Dubai</title>
<style>
body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial; }

#ui {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px;
    width: 280px;
}

button {
    display: block; margin: 5px 0; padding: 6px;
    background: #222; color: white; border: 1px solid #555;
    cursor: pointer; width: 100%;
}
button:hover { background: #444; }

#message { margin-top: 10px; color: #ff6666; }

#visited {
    position: absolute; right: 10px; top: 10px;
    background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px;
    max-height: 90vh; overflow-y: auto; width: 220px;
}

.coord-x { color: #ff5555; }
.coord-y { color: #55ff55; }
.coord-z { color: #5599ff; }
</style>
</head>
<body>

<div id="ui">
    <div id="location"></div>
    <div id="target"></div>
    <button onclick="resetGame()">Reset Game</button>
    <hr>
    <div id="vectors"></div>
    <div id="message"></div>
</div>

<div id="visited">
    <b>Visited Locations</b>
    <ul id="visitedList"></ul>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/controls/OrbitControls.js"></script>

<script>
// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(25,25,25);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Light
const light = new THREE.PointLight(0xffffff,1);
light.position.set(20,20,20);
scene.add(light);

// Grids
scene.add(new THREE.GridHelper(20,20));

const gridXZ = new THREE.GridHelper(20,20);
gridXZ.rotation.x = Math.PI/2;
scene.add(gridXZ);

const gridYZ = new THREE.GridHelper(20,20);
gridYZ.rotation.z = Math.PI/2;
scene.add(gridYZ);

// Axes
scene.add(new THREE.AxesHelper(12));

// Boundary
const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(20,20,20));
scene.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x888888})));

// Player
const player = new THREE.Mesh(
    new THREE.SphereGeometry(0.5,16,16),
    new THREE.MeshStandardMaterial({color:0x00ffff})
);
scene.add(player);

// Target
const targetMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,16,16),
    new THREE.MeshStandardMaterial({color:0xff4444})
);
scene.add(targetMesh);

// --- Data ---
const locations = [
"Atlantis","Burj","Choithrams","Dolphinarium","Emirates",
"Frame","Global Village","Hatta","IMG","JBR",
"Kite Beach","Lulu","MOTF","Nakheel","Opera",
"Palm","QE2","RAK","Souk","Top Golf",
"Umm Suqeim","View","Wild Wadi","Xtreme@Roxy","Yacht Club","Zabeel"
];

let index, position, target, correctVector, multiplier, lockedVector;

// UI
const locDiv = document.getElementById("location");
const targetDiv = document.getElementById("target");
const vectorDiv = document.getElementById("vectors");
const messageDiv = document.getElementById("message");
const visitedList = document.getElementById("visitedList");

// Helpers
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function formatCoord(x,y,z){
    return `(<span class="coord-x">${x}</span>, 
             <span class="coord-y">${y}</span>, 
             <span class="coord-z">${z}</span>)`;
}

// --- SAFE target generation ---
function newRound(){

    let valid = false;

    while(!valid){

        multiplier = randInt(1,5);

        let step = {
            x: randInt(-3,3),
            y: randInt(-3,3),
            z: randInt(-3,3)
        };

        if(step.x===0 && step.y===0 && step.z===0) continue;

        let final = {
            x: position.x + step.x * multiplier,
            y: position.y + step.y * multiplier,
            z: position.z + step.z * multiplier
        };

        // Ensure fully inside world
        if(Math.abs(final.x)<=10 && Math.abs(final.y)<=10 && Math.abs(final.z)<=10){
            correctVector = step;
            target = final;
            valid = true;
        }
    }

    targetMesh.position.set(target.x, target.y, target.z);

    updateUI();
    generateVectors();
}

// UI update
function updateUI(){
    locDiv.innerHTML = `<b>${String.fromCharCode(65+index)}: ${locations[index]}</b>`;
    targetDiv.innerHTML = `Target: ${formatCoord(target.x,target.y,target.z)}`;
}

// Vectors
function generateVectors(){
    vectorDiv.innerHTML = "";
    let vectors = [correctVector];

    for(let i=0;i<4;i++){
        vectors.push({
            x: randInt(-4,4),
            y: randInt(-4,4),
            z: randInt(-4,4)
        });
    }

    vectors.sort(()=>Math.random()-0.5);

    vectors.forEach(v=>{
        let btn = document.createElement("button");
        btn.innerHTML = formatCoord(v.x,v.y,v.z);
        btn.onclick = ()=>chooseVector(v);
        vectorDiv.appendChild(btn);
    });
}

// Choose
function chooseVector(v){
    if(lockedVector) v = lockedVector;

    if(!lockedVector &&
       (v.x!==correctVector.x || v.y!==correctVector.y || v.z!==correctVector.z)){
        lockedVector = v;
        messageDiv.innerText = "Wrong vector chosen. You are locked into this path.";
    }

    move(v);
}

// Move
function move(v){
    position.x += v.x;
    position.y += v.y;
    position.z += v.z;

    player.position.set(position.x, position.y, position.z);

    // Out of bounds
    if(Math.abs(position.x)>10 || Math.abs(position.y)>10 || Math.abs(position.z)>10){
        messageDiv.innerText = "User is lost in the infinite void - restart the game and make better choices";
        vectorDiv.innerHTML = "";
        return;
    }

    // Success
    if(position.x===target.x && position.y===target.y && position.z===target.z){
        addVisited();
        index++;

        if(index>=locations.length){
            messageDiv.innerText = "You reached Z! Victory!";
            vectorDiv.innerHTML = "";
            return;
        }

        messageDiv.innerText = "Correct!";
        lockedVector = null;
        newRound();
    }
}

// Visited list WITH coordinates
function addVisited(){
    let li = document.createElement("li");
    li.innerHTML = `${String.fromCharCode(65+index)}: ${locations[index]} ${formatCoord(position.x,position.y,position.z)}`;
    visitedList.appendChild(li);
}

// Reset
function resetGame(){
    index = 0;
    position = {x:0,y:0,z:0};
    lockedVector = null;
    visitedList.innerHTML = "";
    messageDiv.innerText = "";
    player.position.set(0,0,0);
    newRound();
}

// Init
resetGame();

// Render
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
