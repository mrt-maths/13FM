<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sampling Distribution Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
body { font-family: Arial; text-align: center; }
canvas { width:45vw; height:320px; cursor: pointer; }
.container { display: flex; justify-content: space-around; }
.shake { animation: shake 0.5s; }
@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(3px, -3px); }
  50% { transform: translate(-3px, 3px); }
  75% { transform: translate(3px, 3px); }
  100% { transform: translate(0px, 0px); }
}
.draggable { display:inline-block; padding:10px; border:1px solid black; margin-top:10px; cursor:grab; color:red; }
.sampleText { color: blue; }
.meanText { color: red; }
</style>
</head>
<body>

<h2>Sampling Distribution of the Mean for X~(100,15^2)</h2>

<label>Sample size n: <input type="number" id="n" value="5" min="1" max="100"></label>
<button onclick="toggleAuto()" id="autoBtn" disabled>Automate</button>

<p id="sampleValues"></p>
<p id="meanReveal" class="meanText" style="display:none;"></p>
<div id="meanBox"></div>
<p id="stats"></p>

<div class="container">
<canvas id="popChart"></canvas>
<canvas id="meanChart"></canvas>
</div>

<script>
const bins = Array.from({length:101}, (_,i)=>i+50);
let popData = [];
let meanCounts = Array(101).fill(0);
let totalMeans = 0;
let manualCount = 0;
let currentMean = null;
let autoRunning = false;
let startTime;

function normalCDF(x, mu, sigma) {
  return 0.5 * (1 + erf((x - mu)/(sigma*Math.sqrt(2))));
}

function erf(x) {
  const sign = x >= 0 ? 1 : -1;
  x = Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t = 1/(1+p*x);
  const y = 1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function initPop() {
  for (let k of bins) {
    let p = normalCDF(k+0.5,100,15) - normalCDF(k-0.5,100,15);
    popData.push(Math.round(p*1000000));
  }
}

function inverseNormal() {
  let u = Math.random();
  let v = Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function sample(n) {
  let vals = [];
  for (let i=0;i<n;i++) vals.push(100 + 15*inverseNormal());
  return vals;
}

function mean(arr) {
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

async function takeSample() {
  if (autoRunning) return;

  const canvas = document.getElementById('popChart');
  canvas.classList.add('shake');
  setTimeout(()=>canvas.classList.remove('shake'),500);

  document.getElementById('meanReveal').style.display = 'none';
  document.getElementById('meanBox').innerHTML = '';

  const n = parseInt(document.getElementById('n').value);
  let vals = sample(n);

  let display = [];
  for (let v of vals) {
    display.push(v.toFixed(1));
    document.getElementById('sampleValues').innerHTML = '<span class="sampleText">Sample: ' + display.join(', ') + '</span>';
    await new Promise(r=>setTimeout(r,80));
  }

  currentMean = mean(vals);
  document.getElementById('meanReveal').style.display = 'block';
  document.getElementById('meanReveal').innerText = "Click to reveal mean";

  document.getElementById('meanReveal').onclick = () => {
    document.getElementById('meanReveal').innerText = "Mean: " + currentMean.toFixed(1);
    createDraggableMean();
  }
}

function createDraggableMean() {
  const box = document.getElementById('meanBox');
  box.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'draggable';
  div.draggable = true;
  div.innerText = currentMean.toFixed(1);
  div.ondragstart = (e)=> e.dataTransfer.setData("text", currentMean);
  box.appendChild(div);
}

const popChart = new Chart(document.getElementById('popChart'), {
  type: 'bar',
  data: { labels: bins, datasets: [{ label: 'Population', data: popData, hoverBackgroundColor: 'orange' }] },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false, axis: 'x' },
    plugins: {
      tooltip: {
        position: 'nearest',
        callbacks: {
          title: ctx => "Value: " + ctx[0].label,
          label: ctx => "Frequency: " + ctx.raw
        }
      }
    },
    scales: {
      x: {
        ticks: { font: { size: 18 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 11 }
      },
      y: {
        ticks: { font: { size: 14 } }
      }
    }
  }
});

const meanChartCanvas = document.getElementById('meanChart');
const meanChart = new Chart(meanChartCanvas, {
  type: 'bar',
  data: { labels: bins, datasets: [{ label: 'Sample Means', data: meanCounts, backgroundColor: 'red' }] }
});

meanChartCanvas.addEventListener('dragover', e => e.preventDefault());
meanChartCanvas.addEventListener('drop', e => {
  e.preventDefault();
  const m = parseFloat(e.dataTransfer.getData("text"));
  const bucket = Math.round(m) - 50;
  if (bucket>=0 && bucket<101) {
    meanCounts[bucket]++;
    totalMeans++;
    meanChart.update();
    updateStats();

    document.getElementById('meanBox').innerHTML = '';
    document.getElementById('meanReveal').style.display = 'none';

    manualCount++;
    if (manualCount >= 10) document.getElementById('autoBtn').disabled = false;
  }
});

function updateStats() {
  let meanVal = 0;
  for (let i=0;i<101;i++) meanVal += (i+50)*meanCounts[i];
  meanVal /= totalMeans || 1;

  let varVal = 0;
  for (let i=0;i<101;i++) varVal += meanCounts[i]*Math.pow((i+50)-meanVal,2);
  varVal /= totalMeans || 1;

  document.getElementById('stats').innerText = `Mean of X̄: ${meanVal.toFixed(2)} | Variance of X̄: ${varVal.toFixed(2)}`;
}

function toggleAuto() {
  autoRunning = !autoRunning;
  const btn = document.getElementById('autoBtn');
  btn.innerText = autoRunning ? 'Pause' : 'Automate';

  if (autoRunning) {
    startTime = Date.now();
    autoStep();
  }
}

function autoStep() {
  if (!autoRunning) return;

  let elapsed = (Date.now() - startTime)/1000;
  let rate = Math.min(100, 1 + (99 * elapsed / 60));

  const n = parseInt(document.getElementById('n').value);

  for (let i=0;i<Math.floor(rate);i++) {
    let vals = sample(n);
    let m = mean(vals);

    document.getElementById('sampleValues').innerHTML =
      '<span class="sampleText">Sample: ' + vals.map(v=>v.toFixed(1)).join(', ') + '</span> ' +
      '<span class="meanText">Mean: ' + m.toFixed(1) + '</span>';

    let bucket = Math.round(m) - 50;
    if (bucket>=0 && bucket<101) {
      meanCounts[bucket]++;
      totalMeans++;
    }
  }

  meanChart.update();
  updateStats();

  setTimeout(autoStep, 10); // fast refresh
}

initPop();
popChart.update();

document.getElementById('popChart').onclick = takeSample;
</script>

</body>
</html>
