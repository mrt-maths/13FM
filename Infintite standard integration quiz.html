<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Integration Quiz</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:40px auto; width:720px; border-radius:10px; }
button { display:block; margin:10px auto; padding:12px; width:90%; font-size:16px; cursor:pointer; }
.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }
</style>
</head>
<body>

<div class="box">
<h2>Integration Quiz</h2>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>Score: <span id="score">0 / 0</span></p>
</div>

<script>
let correctCount = 0;
let totalClicks = 0;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function gcd(a,b){ return b ? gcd(b,a%b) : a; }

function frac(n,d){
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }
    if(d===1) return `${n}`;
    return `\\frac{${n}}{${d}}`;
}

function coeff(n,d=1){
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }
    if(n===d) return "";
    if(n===-d) return "-";
    if(d===1) return `${n}`;
    return `\\frac{${n}}{${d}}`;
}

function buildLinear(a,b){
    let xPart = (a===1) ? "x" : `${a}x`;
    if(b===0) return xPart;
    return `${xPart} ${b>0?'+':''}${b}`;
}

function unique(arr){
    return [...new Set(arr)];
}

function newQuestion(){
    let type = randInt(1,7);

    let a = randInt(1,4);
    let b = Math.random()<0.5 ? randInt(-5,5) : 0;
    let inside = buildLinear(a,b);

    let q, correct, wrongs=[];

    // ROOT (FIXED)
    if(type===1){
        let p = randInt(1,4);

        q = `\\(\\int ${p}\\sqrt{${inside}} \\, dx\\)`;

        correct = `\\(${frac(2*p,3*a)}(${inside})^{3/2} + c\\)`;

        wrongs = [
            `\\(${2*p}(${inside})^{3/2} + c\\)`,
            `\\(${p}(${inside})^{2} + c\\)`,
            `\\(${2*p}\\sqrt{${inside}} + c\\)`
        ];
    }

    // EXP
    if(type===2){
        let k = randInt(1,5);
        q = `\\(\\int ${k===1?"":k}\\mathrm{e}^{${inside}} \\, dx\\)`;

        correct = `\\(${frac(k,a)}\\mathrm{e}^{${inside}} + c\\)`;

        wrongs = [
            `\\(${k*a}\\mathrm{e}^{${inside}} + c\\)`,
            `\\(${k}\\mathrm{e}^{${inside}} + c\\)`,
            `\\(${frac(k,a)}\\mathrm{e}^{x} + c\\)`
        ];
    }

    // SIN
    if(type===3){
        let k = randInt(1,5)*(Math.random()<0.5?-1:1);
        q = `\\(\\int ${coeff(k)}\\sin(${inside}) \\, dx\\)`;

        correct = `\\(${coeff(-k,a)}\\cos(${inside}) + c\\)`;

        wrongs = [
            `\\(${coeff(k,a)}\\cos(${inside}) + c\\)`,
            `\\(${coeff(-k)}\\cos(${inside}) + c\\)`,
            `\\(${coeff(-k,a)}\\sin(${inside}) + c\\)`
        ];
    }

    // TAN
    if(type===4){
        q = `\\(\\int \\tan(${inside}) \\, dx\\)`;

        correct = `\\(-${frac(1,a)}\\ln|\\cos(${inside})| + c\\)`;

        wrongs = [
            `\\(${frac(1,a)}\\ln|\\cos(${inside})| + c\\)`,
            `\\(\\ln|\\tan(${inside})| + c\\)`,
            `\\(${frac(1,a)}\\tan(${inside}) + c\\)`
        ];
    }

    // LOG TYPES (balanced)
    if(type===5){
        let k = randInt(1,5);
        let useSimple = Math.random() < 0.2;

        if(useSimple){
            let m = randInt(1,4);
            q = `\\(\\int \\frac{${k}}{${m}x} \\, dx\\)`;
            correct = `\\(${frac(k,m)}\\ln(x) + c\\)`;

            wrongs = [
                `\\(${k}\\ln(x) + c\\)`,
                `\\(${frac(1,m)}\\ln(x) + c\\)`,
                `\\(${frac(k,m)}x + c\\)`
            ];
        } else {
            q = `\\(\\int \\frac{${k}}{${inside}} \\, dx\\)`;
            correct = `\\(${frac(k,a)}\\ln|${inside}| + c\\)`;

            wrongs = [
                `\\(${k}\\ln|${inside}| + c\\)`,
                `\\(${frac(1,a)}\\ln|${inside}| + c\\)`,
                `\\(${frac(k,a)}(${inside}) + c\\)`
            ];
        }
    }

    // CONSTANTS (expanded)
    if(type===6){
        let c = choice(["7","-\\pi","3\\mathrm{e}","1"]);

        q = `\\(\\int ${c} \\, dx\\)`;
        correct = `\\(${c}x + c\\)`;

        wrongs = [
            `\\(${c} + c\\)`,
            `\\(${c}x^2 + c\\)`,
            c==="-\\pi" ? `\\(-\\frac{\\pi^2}{2} + c\\)` :
            c==="3\\mathrm{e}" ? `\\(\\frac{3\\mathrm{e}^2}{2} + c\\)` :
            `\\(\\frac{1^2}{2} + c\\)`
        ];
    }

    // SEC^2
    if(type===7){
        q = `\\(\\int \\sec^2(${inside}) \\, dx\\)`;

        correct = `\\(${frac(1,a)}\\tan(${inside}) + c\\)`;

        wrongs = [
            `\\(${frac(1,a)}\\sec(${inside}) + c\\)`,
            `\\(\\tan(${inside}) + c\\)`,
            `\\(-${frac(1,a)}\\tan(${inside}) + c\\)`
        ];
    }

    let answers = unique([correct, ...wrongs]);
    answers.sort(()=>Math.random()-0.5);

    document.getElementById("question").innerHTML = q;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerHTML = ans;
        btn.onclick = function(){
            totalClicks++;
            if(ans===correct){
                btn.classList.add("correct");
                correctCount++;
                document.getElementById("feedback").innerText = "Correct!";
            } else {
                btn.classList.add("wrong");
                document.getElementById("feedback").innerText = "Incorrect";
            }
            document.getElementById("score").innerText = `${correctCount} / ${totalClicks}`;
            setTimeout(newQuestion, 900);
        };
        ansDiv.appendChild(btn);
    });

    MathJax.typeset();
}

newQuestion();
</script>

</body>
</html>
