<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Integration Quiz (Clean Formatting)</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:40px auto; width:700px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
button { display:block; margin:10px auto; padding:12px; width:90%; font-size:16px; cursor:pointer; }
.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }
</style>
</head>
<body>

<div class="box">
<h2>Integration Quiz</h2>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>Score: <span id="score">0</span></p>
</div>

<script>
let score = 0;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// simplify fraction n/d
function simplify(n,d){
    function gcd(a,b){ return b ? gcd(b,a%b) : a; }
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }
    return [n,d];
}

// format fraction
function frac(n,d){
    let [a,b] = simplify(n,d);
    if(b===1) return `${a}`;
    if(a===0) return "0";
    return `\\frac{${a}}{${b}}`;
}

// coefficient formatting
function coeffLatex(n,d=1){
    let [a,b] = simplify(n,d);

    if(a===0) return "0";
    if(a===b) return "";
    if(a===-b) return "-";

    if(b===1) return `${a}`;
    return `\\frac{${a}}{${b}}`;
}

// ax formatting
function axLatex(a_num,a_den){
    let [n,d] = simplify(a_num,a_den);

    if(n===d) return "x";
    if(n===-d) return "-x";

    if(d===1) return `${n}x`;
    if(n===1) return `\\frac{x}{${d}}`;
    if(n===-1) return `-\\frac{x}{${d}}`;

    return `\\frac{${n}x}{${d}}`;
}

function newQuestion(){
    let type = randInt(1,4);
    let q, correct, wrongs=[];

    if(type===1){
        // exponential
        let a = choice([[1,1],[2,1],[3,1],[1,2],[1,3]]);
        let k = randInt(1,5);

        let inside = axLatex(a[0],a[1]);

        let factor = [k*a[1], a[0]]; // k / a

        q = `\\(\\int ${k===1?"":k}e^{${inside}} \\, dx\\)`;

        correct = `\\(${coeffLatex(factor[0],factor[1])}e^{${inside}} + c\\)`;

        wrongs.push(
            `\\(${k*a[0]/a[1]}e^{${inside}} + c\\)`,
            `\\(${k}e^{${inside}} + c\\)`,
            `\\(${coeffLatex(factor[0],factor[1])}e^{x} + c\\)`
        );
    }

    if(type===2){
        // sin
        let a = choice([[1,1],[2,1],[3,1],[1,2],[1,3]]);
        let k = randInt(1,5)*(Math.random()<0.5?-1:1);

        let inside = axLatex(a[0],a[1]);

        let factor = [-k*a[1], a[0]];

        q = `\\(\\int ${k===1?"":k===-1?"-":k}\\sin(${inside}) \\, dx\\)`;

        correct = `\\(${coeffLatex(factor[0],factor[1])}\\cos(${inside}) + c\\)`;

        wrongs.push(
            `\\(${coeffLatex(k*a[1],a[0])}\\cos(${inside}) + c\\)`,
            `\\(${k===-1?"-":k}\\cos(${inside}) + c\\)`,
            `\\(${coeffLatex(factor[0],factor[1])}\\sin(${inside}) + c\\)`
        );
    }

    if(type===3){
        // cos
        let a = choice([[1,1],[2,1],[3,1],[1,2],[1,3]]);
        let k = randInt(1,5)*(Math.random()<0.5?-1:1);

        let inside = axLatex(a[0],a[1]);

        let factor = [k*a[1], a[0]];

        q = `\\(\\int ${k===1?"":k===-1?"-":k}\\cos(${inside}) \\, dx\\)`;

        correct = `\\(${coeffLatex(factor[0],factor[1])}\\sin(${inside}) + c\\)`;

        wrongs.push(
            `\\(${coeffLatex(-factor[0],factor[1])}\\sin(${inside}) + c\\)`,
            `\\(${k}\\sin(${inside}) + c\\)`,
            `\\(${coeffLatex(factor[0],factor[1])}\\cos(${inside}) + c\\)`
        );
    }

    if(type===4){
        // ln
        let a=randInt(1,5), b=randInt(-5,5), k=randInt(1,5);

        let factor = [k,a];

        q = `\\(\\int \\frac{${k}}{${a}x ${b>=0?'+':''}${b}} \\, dx\\)`;

        correct = `\\(${frac(k,a)} \\ln|${a}x ${b>=0?'+':''}${b}| + c\\)`;

        wrongs.push(
            `\\(${k} \\ln|${a}x ${b>=0?'+':''}${b}| + c\\)`,
            `\\(${frac(1,a)} \\ln|${a}x ${b>=0?'+':''}${b}| + c\\)`,
            `\\(${frac(k,a)}(${a}x ${b>=0?'+':''}${b}) + c\\)`
        );
    }

    let answers = [correct, ...wrongs];
    answers.sort(()=>Math.random()-0.5);

    document.getElementById("question").innerHTML = q;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerHTML = ans;
        btn.onclick = function(){
            if(ans===correct){
                btn.classList.add("correct");
                score++;
                document.getElementById("feedback").innerText = "Correct!";
            } else {
                btn.classList.add("wrong");
                document.getElementById("feedback").innerText = "Incorrect";
            }
            document.getElementById("score").innerText = score;
            setTimeout(newQuestion, 900);
        };
        ansDiv.appendChild(btn);
    });

    MathJax.typeset();
}

newQuestion();
</script>

</body>
</html>
