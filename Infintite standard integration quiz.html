<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Integration Quiz</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:40px auto; width:720px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
button { display:block; margin:10px auto; padding:12px; width:90%; font-size:16px; cursor:pointer; }
.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }
</style>
</head>
<body>

<div class="box">
<h2>Integration Quiz</h2>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>Score: <span id="score">0</span></p>
</div>

<script>
let score = 0;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function gcd(a,b){ return b ? gcd(b,a%b) : a; }

function simplify(n,d){
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }
    return [n,d];
}

function frac(n,d){
    let [a,b] = simplify(n,d);
    if(b===1) return `${a}`;
    return `\\frac{${a}}{${b}}`;
}

function coeff(n,d=1){
    let [a,b] = simplify(n,d);
    if(a===b) return "";
    if(a===-b) return "-";
    if(b===1) return `${a}`;
    return `\\frac{${a}}{${b}}`;
}

function ax(a,b){
    if(a===1) return `x ${b>=0?'+':''}${b}`;
    return `${a}x ${b>=0?'+':''}${b}`;
}

// remove duplicates
function unique(arr){
    return [...new Set(arr)];
}

function newQuestion(){
    let type = randInt(1,6);
    let q, correct, wrongs=[];

    // 1. CONSTANTS
    if(type===1){
        let c = choice(["7","7\\pi","7\\mathrm{e}"]);
        q = `\\(\\int ${c} \\, dx\\)`;
        correct = `\\(${c}x + c\\)`;

        wrongs = [
            `\\(${c} + c\\)`,
            `\\(x${c}^2 + c\\)`,
            `\\(${c}x^2 + c\\)`
        ];
    }

    // 2. POWER (ax+b)^n
    if(type===2){
        let a=randInt(1,4), b=randInt(-5,5), p=randInt(1,4);
        let n = choice([3,4,5,-2,"1/2","-1/2"]);

        let inside = `${a}x ${b>=0?'+':''}${b}`;

        if(n===-2){
            correct = `\\(${coeff(-p,a)}(${inside})^{-1} + c\\)`;
        }
        else if(n==="1/2"){
            correct = `\\(${coeff(2*p,a)}\\sqrt{${inside}} + c\\)`;
        }
        else if(n==="-1/2"){
            correct = `\\(${coeff(2*p,a)}(${inside})^{1/2} + c\\)`;
        }
        else{
            correct = `\\(${coeff(p,a*(n+1))}(${inside})^{${n+1}} + c\\)`;
        }

        q = `\\(\\int ${p}(${inside})^{${n}} \\, dx\\)`;

        wrongs = [
            `\\(${coeff(p,n+1)}(${inside})^{${n+1}} + c\\)`,
            `\\(${coeff(p,a)}(${inside})^{${n+1}} + c\\)`,
            `\\(${p*n}(${inside})^{${n-1}} + c\\)`
        ];
    }

    // 3. TAN
    if(type===3){
        let a=randInt(1,4);
        q = `\\(\\int \\tan(${a}x) \\, dx\\)`;

        correct = `\\(-${frac(1,a)}\\ln|\\cos(${a}x)| + c\\)`;

        wrongs = [
            `\\(${frac(1,a)}\\ln|\\cos(${a}x)| + c\\)`,
            `\\(\\ln|\\tan(${a}x)| + c\\)`,
            `\\(${frac(1,a)}\\tan(${a}x) + c\\)`
        ];
    }

    // 4. COT
    if(type===4){
        let a=randInt(1,4);
        q = `\\(\\int \\cot(${a}x) \\, dx\\)`;

        correct = `\\(${frac(1,a)}\\ln|\\sin(${a}x)| + c\\)`;

        wrongs = [
            `\\(-${frac(1,a)}\\ln|\\sin(${a}x)| + c\\)`,
            `\\(\\ln|\\cot(${a}x)| + c\\)`,
            `\\(${frac(1,a)}\\cot(${a}x) + c\\)`
        ];
    }

    // 5. SEC^2
    if(type===5){
        let a=randInt(1,4);
        q = `\\(\\int \\sec^2(${a}x) \\, dx\\)`;

        correct = `\\(${frac(1,a)}\\tan(${a}x) + c\\)`;

        wrongs = [
            `\\(${frac(1,a)}\\sec(${a}x) + c\\)`,
            `\\(\\tan(${a}x) + c\\)`,
            `\\(-${frac(1,a)}\\tan(${a}x) + c\\)`
        ];
    }

    // 6. EXPONENTIAL
    if(type===6){
        let a=randInt(1,4), k=randInt(1,5);
        q = `\\(\\int ${k}\\mathrm{e}^{${a}x} \\, dx\\)`;

        correct = `\\(${frac(k,a)}\\mathrm{e}^{${a}x} + c\\)`;

        wrongs = [
            `\\(${k*a}\\mathrm{e}^{${a}x} + c\\)`,
            `\\(${k}\\mathrm{e}^{${a}x} + c\\)`,
            `\\(${frac(k,a)}\\mathrm{e}^{x} + c\\)`
        ];
    }

    let answers = unique([correct, ...wrongs]);
    answers.sort(()=>Math.random()-0.5);

    document.getElementById("question").innerHTML = q;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerHTML = ans;
        btn.onclick = function(){
            if(ans===correct){
                btn.classList.add("correct");
                score++;
                document.getElementById("feedback").innerText = "Correct!";
            } else {
                btn.classList.add("wrong");
                document.getElementById("feedback").innerText = "Incorrect";
            }
            document.getElementById("score").innerText = score;
            setTimeout(newQuestion, 900);
        };
        ansDiv.appendChild(btn);
    });

    MathJax.typeset();
}

newQuestion();
</script>

</body>
</html>
