<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Integration Quiz</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:40px auto; width:720px; border-radius:10px; }
button { display:block; margin:10px auto; padding:12px; width:90%; font-size:16px; cursor:pointer; }
.correct { background:#c8f7c5; }
.wrong { background:#f7c5c5; }
</style>
</head>
<body>

<div class="box">
<h2>Integration Quiz</h2>
<p id="question"></p>
<div id="answers"></div>
<p id="feedback"></p>
<p>Score: <span id="score">0</span></p>
</div>

<script>
let score = 0;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function gcd(a,b){ return b ? gcd(b,a%b) : a; }

function frac(n,d){
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }
    if(d===1) return `${n}`;
    return `\\frac{${n}}{${d}}`;
}

function coeff(n,d=1){
    let g = gcd(Math.abs(n),Math.abs(d));
    n/=g; d/=g;
    if(d<0){ n=-n; d=-d; }

    if(n===d) return "";
    if(n===-d) return "-";
    if(d===1) return `${n}`;
    return `\\frac{${n}}{${d}}`;
}

// builds ax or ax+b cleanly
function buildLinear(a,b){
    let xPart = (a===1) ? "x" : `${a}x`;
    if(b===0) return xPart;
    return `${xPart} ${b>0?'+':''}${b}`;
}

function unique(arr){
    return [...new Set(arr)];
}

function newQuestion(){
    let type = randInt(1,6);
    let useShift = Math.random() < 0.5;

    let a = randInt(1,4);
    let b = useShift ? randInt(-5,5) : 0;

    let inside = buildLinear(a,b);

    let q, correct, wrongs=[];

    // EXP
    if(type===1){
        let k = randInt(1,5);
        q = `\\(\\int ${k===1?"":k}\\mathrm{e}^{${inside}} \\, dx\\)`;

        correct = `\\(${coeff(k,a)}\\mathrm{e}^{${inside}} + c\\)`;

        wrongs = [
            `\\(${k*a}\\mathrm{e}^{${inside}} + c\\)`,
            `\\(${k}\\mathrm{e}^{${inside}} + c\\)`,
            `\\(${coeff(k,a)}\\mathrm{e}^{x} + c\\)`
        ];
    }

    // SIN
    if(type===2){
        let k = randInt(1,5)*(Math.random()<0.5?-1:1);
        q = `\\(\\int ${coeff(k)}\\sin(${inside}) \\, dx\\)`;

        correct = `\\(${coeff(-k,a)}\\cos(${inside}) + c\\)`;

        wrongs = [
            `\\(${coeff(k,a)}\\cos(${inside}) + c\\)`,
            `\\(${coeff(-k)}\\cos(${inside}) + c\\)`,
            `\\(${coeff(-k,a)}\\sin(${inside}) + c\\)`
        ];
    }

    // TAN
    if(type===3){
        q = `\\(\\int \\tan(${inside}) \\, dx\\)`;

        correct = `\\(-${frac(1,a)}\\ln|\\cos(${inside})| + c\\)`;

        wrongs = [
            `\\(${frac(1,a)}\\ln|\\cos(${inside})| + c\\)`,
            `\\(\\ln|\\tan(${inside})| + c\\)`,
            `\\(${frac(1,a)}\\tan(${inside}) + c\\)`
        ];
    }

    // POWER
    if(type===4){
        let p = randInt(1,4);
        let nType = choice(["pos","sqrt","neg"]);

        if(nType==="sqrt"){
            q = `\\(\\int ${p}\\sqrt{${inside}} \\, dx\\)`;
            correct = `\\(${coeff(2*p,a)}\\sqrt{${inside}} + c\\)`;
        }
        else if(nType==="neg"){
            q = `\\(\\int ${p}(${inside})^{-2} \\, dx\\)`;
            correct = `\\(${coeff(-p,a)}(${inside})^{-1} + c\\)`;
        }
        else{
            let n = randInt(3,5);
            q = `\\(\\int ${p}(${inside})^{${n}} \\, dx\\)`;
            correct = `\\(${coeff(p,a*(n+1))}(${inside})^{${n+1}} + c\\)`;
        }

        wrongs = [
            `\\(${p}(${inside})^{2} + c\\)`,
            `\\(${coeff(p,a)}(${inside})^{2} + c\\)`,
            `\\(${p}(${inside}) + c\\)`
        ];
    }

    // 1/x TYPE
    if(type===5){
        let k = randInt(1,5);
        let m = randInt(1,4);

        q = `\\(\\int \\frac{${k}}{${m}x} \\, dx\\)`;

        correct = `\\(${frac(k,m)}\\ln(x) + c\\)`;

        wrongs = [
            `\\(${k}\\ln(x) + c\\)`,
            `\\(${frac(1,m)}\\ln(x) + c\\)`,
            `\\(${frac(k,m)}x + c\\)`
        ];
    }

    // CONSTANT
    if(type===6){
        let c = choice(["7","7\\pi","7\\mathrm{e}"]);
        q = `\\(\\int ${c} \\, dx\\)`;

        correct = `\\(${c}x + c\\)`;

        wrongs = [
            `\\(${c} + c\\)`,
            `\\(${c}x^2 + c\\)`,
            `\\(x${c}^2 + c\\)`
        ];
    }

    let answers = unique([correct, ...wrongs]);
    answers.sort(()=>Math.random()-0.5);

    document.getElementById("question").innerHTML = q;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    answers.forEach(ans=>{
        let btn = document.createElement("button");
        btn.innerHTML = ans;
        btn.onclick = function(){
            if(ans===correct){
                btn.classList.add("correct");
                score++;
                document.getElementById("feedback").innerText = "Correct!";
            } else {
                btn.classList.add("wrong");
                document.getElementById("feedback").innerText = "Incorrect";
            }
            document.getElementById("score").innerText = score;
            setTimeout(newQuestion, 900);
        };
        ansDiv.appendChild(btn);
    });

    MathJax.typeset();
}

newQuestion();
</script>

</body>
</html>
